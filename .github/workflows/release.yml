name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BIN_NAME: mips-language-server

jobs:
  build-linux:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
            vscode_target: linux-x64
          - target: aarch64-unknown-linux-gnu
            use_cross: true
            vscode_target: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          dist="dist"
          mkdir -p "$dist"

          bin_path="target/${target}/release/${BIN_NAME}"
          test -f "$bin_path"

          pkg="${BIN_NAME}-${version}-${target}"
          tar -C "$(dirname "$bin_path")" -czf "${dist}/${pkg}.tar.gz" "$(basename "$bin_path")"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS-${{ matrix.target }}.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.txt

  build-macos:
    name: Build (macOS ${{ matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            vscode_target: darwin-arm64
          - target: x86_64-apple-darwin
            vscode_target: darwin-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          dist="dist"
          mkdir -p "$dist"

          bin_path="target/${target}/release/${BIN_NAME}"
          test -f "$bin_path"

          pkg="${BIN_NAME}-${version}-${target}"
          tar -C "$(dirname "$bin_path")" -czf "${dist}/${pkg}.tar.gz" "$(basename "$bin_path")"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.tar.gz > SHA256SUMS-${{ matrix.target }}.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.txt

  build-windows:
    name: Build (Windows ${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            vscode_target: win32-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${env:GITHUB_REF_NAME}"
          $target = "${{ matrix.target }}"
          $dist = "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $binPath = "target/$target/release/${env:BIN_NAME}.exe"
          if (-not (Test-Path $binPath)) { throw "Missing binary at $binPath" }

          $pkg = "${env:BIN_NAME}-$version-$target"
          Compress-Archive -Path $binPath -DestinationPath "$dist/$pkg.zip" -Force

      - name: Generate checksums
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem dist -Filter *.zip | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -FilePath "dist/SHA256SUMS-${{ matrix.target }}.txt" -Append -Encoding ascii
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: |
            dist/*.zip
            dist/*.txt

  package-vsix:
    name: Package VSIX (${{ matrix.vscode_target }})
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            vscode_target: linux-x64
            os: linux
            cpu: x64
            exe: ""
          - target: aarch64-unknown-linux-gnu
            vscode_target: linux-arm64
            os: linux
            cpu: arm64
            exe: ""
          - target: aarch64-apple-darwin
            vscode_target: darwin-arm64
            os: darwin
            cpu: arm64
            exe: ""
          - target: x86_64-apple-darwin
            vscode_target: darwin-x64
            os: darwin
            cpu: x64
            exe: ""
          - target: x86_64-pc-windows-msvc
            vscode_target: win32-x64
            os: win32
            cpu: x64
            exe: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          pattern: "*-${{ matrix.target }}"
          path: artifacts

      - name: Extract binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/${{ matrix.target }}/release

          if [[ "${{ matrix.os }}" == "win32" ]]; then
            unzip -j artifacts/*-${{ matrix.target }}/dist/*.zip -d target/${{ matrix.target }}/release/
          else
            tar -xzf artifacts/*-${{ matrix.target }}/dist/*.tar.gz -C target/${{ matrix.target }}/release/
          fi

          ls -la target/${{ matrix.target }}/release/

      - name: Package VSIX
        shell: bash
        run: |
          cd editors/vscode
          node scripts/package.js \
            --binary-path ../../target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.exe }} \
            --os ${{ matrix.os }} \
            --cpu ${{ matrix.cpu }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vscode_target }}
          path: editors/vscode/vsix/*.vsix

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, package-vsix]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.txt' -o -name '*.vsix' \) -print -exec cp -v {} dist/ \;

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.txt
            dist/*.vsix
          generate_release_notes: true

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Verify package (dry run)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --dry-run

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  publish-vscode:
    name: Publish to VS Code Marketplace & Open VSX
    runs-on: ubuntu-latest
    needs: [package-vsix]

    steps:
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          path: vsix-artifacts

      - name: Flatten VSIXs
        shell: bash
        run: |
          mkdir -p vsix
          find vsix-artifacts -name '*.vsix' -exec cp -v {} vsix/ \;
          ls -la vsix/

      - name: Publish to Open VSX
        continue-on-error: true
        run: |
          for vsix in vsix/*.vsix; do
            echo "Publishing $vsix to Open VSX..."
            npx ovsx publish "$vsix" -p ${{ secrets.OPEN_VSX_TOKEN }}
          done

      - name: Publish to VS Code Marketplace
        continue-on-error: true
        run: |
          for vsix in vsix/*.vsix; do
            echo "Publishing $vsix to VS Code Marketplace..."
            npx vsce publish --packagePath "$vsix" -p ${{ secrets.VSCE_PAT }}
          done
